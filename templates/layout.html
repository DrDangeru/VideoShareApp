{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/modern.css?v=4">
  <script>
    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('theme-light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('theme-light');
    }
  </script>
</head>
<body>
  <header class="header">
    <div class="wrap header-inner">
      <a class="brand" href="/">VideoShareApp</a>
      <nav class="nav">
        <button onclick="toggleTheme()" class="theme-toggle" title="Toggle light/dark mode">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-moon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-sun">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        {{if .CurrentUser}}
          <a href="/dashboard">Upload your videos</a>
          <span class="nav-text">{{.CurrentUser.Email}} · {{.CurrentUser.Location}}</span>
          <a href="/logout">Logout</a>
        {{else}}
          <a href="/login">Login</a>
          <a href="/register">Register</a>
        {{end}}
      </nav>
    </div>
  </header>

  <main class="wrap main-content">
    {{template "page_content" .}}
  </main>
</body>
</html>
{{end}}
