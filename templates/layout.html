{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/modern.css?v=8">
  <script>
    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('theme-light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('theme-light');
    }

    // Banner Ad Logic
    document.addEventListener('DOMContentLoaded', () => {
      const bannerAds = [
        {
          url: "https://example.com/ad1",
          img: "/static/img/yourAddColorMini.jpg"
        },
        {
          url: "https://example.com/ad2",
          img: "/static/img/yourAddColorMini.jpg"
        },
        {
          url: "https://example.com/ad3",
          img: "/static/img/yourAddColorMini.jpg"
        }
      ];

      const ad = bannerAds[Math.floor(Math.random() * bannerAds.length)];
      const bannerContainer = document.querySelector('.banner-ad-content');
      const bannerLink = document.getElementById('banner-ad-link');
      const bannerImg = document.getElementById('banner-ad-img');

      if (bannerContainer && bannerLink && bannerImg) {
        bannerLink.href = ad.url;
        bannerImg.src = ad.img;
        bannerContainer.classList.add('active');
      }
    });
  </script>
</head>
<body>
  <!-- Decorative background circles -->
  <div class="bg-decoration">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>
  </div>

  <!-- Toast notification container -->
  <div id="toast-container" class="toast-container"></div>

  <header class="header">
    <div class="wrap header-inner">
      <a class="brand" href="/">VideoShareApp</a>
      <nav class="nav">
        <button onclick="toggleTheme()" class="theme-toggle" title="Toggle light/dark mode">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" 
               fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-moon">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" 
               fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon-sun">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        {{if .CurrentUser}}
          <a href="/dashboard">Upload your videos</a>
          <span class="nav-text">{{.CurrentUser.Email}} · {{.CurrentUser.Location}}</span>
          <a href="/logout">Logout</a>
        {{else}}
          <a href="/login">Login</a>
          <a href="/register">Register</a>
        {{end}}
      </nav>
    </div>
  </header>
  <main class="wrap main-content">
    {{template "page_content" .}}
  </main>

  <script>
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 10);
      
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Check URL params for subscription messages
    const params = new URLSearchParams(window.location.search);
    if (params.get('subscribed')) {
      showToast('Successfully subscribed to ' + params.get('subscribed'), 'success');
    }
    if (params.get('unsubscribed')) {
      showToast('Unsubscribed from ' + params.get('unsubscribed'), 'info');
    }
    if (params.get('notify_on')) {
      showToast('Notifications enabled for ' + params.get('notify_on'), 'success');
    }
    if (params.get('notify_off')) {
      showToast('Notifications disabled for ' + params.get('notify_off'), 'info');
    }
  </script>
</body>
</html>
{{end}}
